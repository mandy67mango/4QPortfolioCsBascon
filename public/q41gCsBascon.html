<!DOCTYPE html>
<html>
  <head>
    <style>
    body {
      font-family: Comic Sans MS;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 50vw;
      margin: auto;
      padding: 20px 30px;
      border-radius: 10px;
      border-style: ridge;
    }
    h1, h2 {
      text-align: center;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    .star {
  font-size: 5vw;
}

.one, .two, .three, .four, .five {
  color: rgb(251, 255, 120);
}

    </style>
  </head>
  <body>
    <div class="container">
      <h1>Add a Movie</h1>
      <form id="movieForm">
        <label>Title:<br>
        <input type="text" id="bookTitle" required /></label><br>
        <label>Year:<br>
        <input type="text" id="bookYear" required /></label><br>
        <label>Genre:<br></label>
        <select id="genre">
          <option value="Action">Action</option>
          <option value="Comedy">Comedy</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Fiction">Fiction</option>
          <option value="Horror">Horror</option>
        </select><br><br>
          <label>Star Rating</label>
          <span onclick="gfg(1)" class="star">&#9733;</span>
          <span onclick="gfg(2)" class="star">&#9733;</span>
          <span onclick="gfg(3)" class="star">&#9733;</span>
          <span onclick="gfg(4)" class="star">&#9733;</span>
          <span onclick="gfg(5)" class="star">&#9733;</span>
        <br>
        <button type="submit"> Add Movie </button>
      </form>
      <br/>
      <h2>Movie List</h2>
      <div id="bruhmoments"></div>
    </div>
      
     <script>
        let stars = document.getElementsByClassName("star");
let currentRating = 0;
function gfg(n) {
  currentRating = n;
  remove();
  for (let i = 0; i < n; i++) {
    let cls = ["one", "two", "three", "four", "five"][n - 1];
    stars[i].className = "star " + cls;
  }
}
function remove() {
  for (let i = 0; i < 5; i++) stars[i].className = "star";
}
document.getElementById("movieForm").onsubmit = (e) => {
    e.preventDefault();
    let t = document.getElementById("bookTitle").value;
    let y = document.getElementById("bookYear").value;
    let list = JSON.parse(localStorage.getItem("movies")) || [];
    let hatdog = null;
    for (let i = 0; i < list.length; i++) {
        if (list[i].t === t && list[i].y === y) {
            hatdog = list[i];
            break; 
        }
    }
    if (hatdog) {
        let totalStars = Number(hatdog.r) * hatdog.c; 
        hatdog.c += 1;
        hatdog.r = (totalStars + currentRating) / hatdog.c; 
    } else {
        list.push({
            t: t,
            y: y,
            g: document.getElementById("genre").value,
            r: currentRating,
            c: 1 
        });
    }
    localStorage.setItem("movies", JSON.stringify(list));
    document.getElementById("movieForm").reset();
    gfg(0);
    show();
};
function show() {
    let list = JSON.parse(localStorage.getItem("movies")) || [];
    let muhammad = "";
    for (let i = 0; i < list.length; i++) {
        let m = list[i];
        muhammad += `<p>${m.t} (${m.y}) - ${m.g}, Rating: <span class="one">${"★".repeat(parseInt(m.r))}</span><button type="button" onclick="bomb(${i})" style="width:auto; margin-left:10px;">Delete</button></p>`;
    }
    document.getElementById("bruhmoments").innerHTML = muhammad;
}
function bomb(index) {
    if (confirm("Are you sure you want to delete?")) {
        let list = JSON.parse(localStorage.getItem("movies")) || [];
        list.splice(index, 1); 
        localStorage.setItem("movies", JSON.stringify(list));
        show();
    }
}
show();
      </script>
  </body>
</html>
