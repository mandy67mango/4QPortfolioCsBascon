<!DOCTYPE html>
<html>
  <head>
    <style>
    body {
      font-family: Comic Sans MS;
      margin: 0;
      padding: 20px;
    }
     .container {
      max-width: 20vw;
      margin: auto;
      padding: 20px 30px;
      border-radius: 10px;
      border-style: ridge;
    }
      h1 {
      text-align: center;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    .star {
  font-size: 10vh;
  cursor: pointer;
}
.one {
  color: rgb(255, 0, 0);
}
.two {
  color: rgb(255, 106, 0);
}
.three {
  color: rgb(251, 255, 120);
}
.four {
  color: rgb(255, 255, 0);
}
.five {
  color: rgb(24, 159, 14);
}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Add a Movie</h1>
      <form id="movieForm">
        <label>Title:<br>
        <input type="text" id="bookTitle" /></label><br>
        <label>Year:<br>
        <input type="text" id="bookYear" /></label><br>
        <label>Genre:<br></label>
         <select id="genre">
      <option value="Action">Action</option>
      <option value="Comedy">Comedy</option>
      <option value="Drama">Drama</option>
      <option value="Sci-Fi">Sci-Fi</option>
      </select><br><br><br>
      <div class="card">
        <h1>Star Rating</h1>
        <br />
        <span onclick="gfg(1)" class="star">★</span>
        <span onclick="gfg(2)" class="star">★</span>
        <span onclick="gfg(3)" class="star">★</span>
        <span onclick="gfg(4)" class="star">★</span>
        <span onclick="gfg(5)" class="star">★</span>
    </div>
        <button> Submit </button>
      </form>
      <br/>
      </div>
      
      <span>Searh for : </span><input type="text" id="searchTitle" placeholder="Enter a Title" /> 
      <button onclick="search()"> Display </button>
      <div id="listBooks"> </div>
      
      <script src="script.js"></script>
  </body>
</html>
