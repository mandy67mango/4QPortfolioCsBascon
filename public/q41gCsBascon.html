<!DOCTYPE html>
<html>
  <head>
    <style>
    body {
      font-family: Comic Sans MS;
      margin: 0;
      padding: 20px;
    }
     .container {
      max-width: 20vw;
      margin: auto;
      padding: 20px 30px;
      border-radius: 10px;
      border-style: ridge;
    }
      h1 {
      text-align: center;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Add a Movie</h1>
      <form id="movieForm">
        <label>Title:<br>
        <input type="text" id="bookTitle" /></label><br>
        <label>Year:<br>
        <input type="text" id="bookYear" /></label><br>
        <label>Genre:<br></label>
         <select id="genre">
      <option value="Action">Action</option>
      <option value="Comedy">Comedy</option>
      <option value="Drama">Drama</option>
      <option value="Sci-Fi">Sci-Fi</option>
      </select><br><br><br>
        <button> Submit </button>
      </form>
      <br/>
      </div>
      
      <span>Searh for : </span><input type="text" id="searchTitle" placeholder="Enter a Title" /> 
      <button onclick="search()"> Display </button>
      <div id="listBooks"> </div>
      
      <script src="script.js"></script>
  </body>
</html>
