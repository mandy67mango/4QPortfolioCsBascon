<!DOCTYPE html>
<html>
  <head>
    <style>
    body {
      font-family: Comic Sans MS;
      margin: 0;
      padding: 20px;
    }
     .container {
      max-width: 50vw;
      margin: auto;
      padding: 20px 30px;
      border-radius: 10px;
      border-style: ridge;
    }
      h1 {
      text-align: center;
    }
    label {
      display: block;
      margin: 10px 0 5px;
    }
    .star {
  font-size: 5vw;
  cursor: pointer;
}

.one, .two, .three, .four, .five {
  color: rgb(251, 255, 120);
}

    </style>
  </head>
  <body>
    <div class="container">
      <h1>Add a Movie</h1>
      <form id="movieForm">
        <label>Title:<br>
        <input type="text" id="bookTitle" /></label><br>
        <label>Year:<br>
        <input type="text" id="bookYear" /></label><br>
        <label>Genre:<br></label>
         <select id="genre">
      <option value="Action">Action</option>
      <option value="Comedy">Comedy</option>
      <option value="Drama">Fantasy</option>
      <option value="Drama">Fiction</option>
      <option value="Drama">Horror</option>
      </select><br><br><br>
      <div class="space">
        <label>Star Rating</label>
        <span onclick="gfg(1)" class="star">★</span>
        <span onclick="gfg(2)" class="star">★</span>
        <span onclick="gfg(3)" class="star">★</span>
        <span onclick="gfg(4)" class="star">★</span>
        <span onclick="gfg(5)" class="star">★</span>
    </div>
        <button> Submit </button>
      </form>
      <br/>
      </div>
      
      <span>Searh for : </span><input type="text" id="searchTitle" placeholder="Enter a Title" /> 
      <button onclick="search()"> Display </button>
      <div id="listBooks"> </div>
      
      <script>
        let stars = 
    document.getElementsByClassName("star");
    function gfg(n) {
    remove();
    for (let i = 0; i < n; i++) {
        if (n == 1) cls = "one";
        else if (n == 2) cls = "two";
        else if (n == 3) cls = "three";
        else if (n == 4) cls = "four";
        else if (n == 5) cls = "five";
        stars[i].className = "star " + cls;
    }
    }

function remove() {
    let i = 0;
    while (i < 5) {
        stars[i].className = "star";
        i++;
    }
}
      </script>
  </body>
</html>
